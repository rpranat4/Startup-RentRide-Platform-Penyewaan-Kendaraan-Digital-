<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RentRide Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{

    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top right,#dbeafe 0%,transparent 30%),
    radial-gradient(circle at bottom left,#e0f2fe 0%,transparent 35%),
    #f5f7fb;

}

/* Banner */

.dashboard-banner{

    background:linear-gradient(135deg,#0d6efd,#4facfe);

    color:white;

    border-radius:20px;

    padding:35px;

    margin-bottom:35px;

    position:relative;

    overflow:hidden;

    box-shadow:0 10px 25px rgba(13,110,253,.2);

}

.dashboard-banner::after{

    content:"";

    width:220px;

    height:220px;

    background:rgba(255,255,255,.12);

    border-radius:50%;

    position:absolute;

    right:-70px;

    top:-60px;

}

.dashboard-banner h2{

    font-weight:700;

}

/* Card Statistik */

.dashboard-card{

    background:white;

    border:none;

    border-radius:20px;

    padding:25px;

    position:relative;

    overflow:hidden;

    text-align:center;

    transition:.3s;

    box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.dashboard-card:hover{

    transform:translateY(-8px);

    box-shadow:0 18px 30px rgba(0,0,0,.15);

}

.dashboard-card::before{

    content:"";

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:5px;

    background:linear-gradient(90deg,#0d6efd,#4facfe);

}

.dashboard-card::after{

    content:"";

    width:120px;

    height:120px;

    background:rgba(13,110,253,.05);

    border-radius:50%;

    position:absolute;

    right:-35px;

    top:-35px;

}

.dashboard-card i:first-child{

    font-size:45px;

    color:#0d6efd;

    margin-bottom:15px;

}

.dashboard-card h3{

    font-size:38px;

    font-weight:700;

}

.dashboard-card p{

    color:#6c757d;

    margin:0;

}

/* Tombol */

.menu-card{

    background:white;

    border-radius:20px;

    padding:25px;

    margin-top:40px;

    box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.btn{

    border-radius:30px;

    padding:12px 22px;

    font-weight:600;

    transition:.3s;

}

.btn:hover{

    transform:translateY(-3px);

}

/* Footer */

.footer-note{

    text-align:center;

    margin-top:40px;

    color:#6c757d;

    font-size:15px;

}

</style>

</head>

<body>

<div class="container py-5">

<!-- Banner -->

<div class="dashboard-banner">

<div class="row align-items-center">

<div class="col-md-8">

<h2>

🚗 RentRide Dashboard

</h2>

<p class="mb-0">

Kelola kendaraan, pengguna, dan transaksi penyewaan dalam satu dashboard.

</p>

</div>

<div class="col-md-4 text-end">

<i class="bi bi-car-front-fill"
style="font-size:90px;opacity:.25;"></i>

</div>

</div>

</div>

<!-- Statistik -->

<div class="row g-4">

<div class="col-lg-3">

<div class="dashboard-card">

<i class="bi bi-people-fill"></i>

<h3>18</h3>

<p>Jumlah User</p>

<i class="bi bi-person-fill"
style="position:absolute;right:15px;bottom:15px;font-size:65px;opacity:.08;"></i>

</div>

</div>

<div class="col-lg-3">

<div class="dashboard-card">

<i class="bi bi-car-front-fill"></i>

<h3>15</h3>

<p>Mobil</p>

<i class="bi bi-car-front-fill"
style="position:absolute;right:15px;bottom:15px;font-size:65px;opacity:.08;"></i>

</div>

</div>

<div class="col-lg-3">

<div class="dashboard-card">

<i class="bi bi-bicycle"></i>

<h3>22</h3>

<p>Motor</p>

<i class="bi bi-bicycle"
style="position:absolute;right:15px;bottom:15px;font-size:65px;opacity:.08;"></i>

</div>

</div>

<div class="col-lg-3">

<div class="dashboard-card">

<i class="bi bi-calendar-check-fill"></i>

<h3>9</h3>

<p>Total Booking</p>

<i class="bi bi-calendar-check-fill"
style="position:absolute;right:15px;bottom:15px;font-size:65px;opacity:.08;"></i>

</div>

</div>

</div>

<!-- Menu -->

<div class="menu-card">

<h4 class="fw-bold mb-4">

🚘 Menu Manajemen Kendaraan

</h4>

<div class="d-flex flex-wrap gap-3">

<button class="btn btn-success">

<i class="bi bi-plus-circle-fill"></i>

Tambah Kendaraan

</button>

<button class="btn btn-warning">

<i class="bi bi-pencil-square"></i>

Edit Kendaraan

</button>

<button class="btn btn-danger">

<i class="bi bi-trash-fill"></i>

Hapus Kendaraan

</button>

</div>

</div>

<!-- Footer -->

<div class="footer-note">

© 2026 RentRide - Smart Vehicle Rental Management System

</div>

</div>

</body>

</html>

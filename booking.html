<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Booking RentRide</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{

    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top right,#dbeafe 0%,transparent 30%),
    radial-gradient(circle at bottom left,#e0f2fe 0%,transparent 35%),
    #f5f7fb;

}

/* Card */

.booking-card{

    max-width:800px;

    margin:50px auto;

    border:none;

    border-radius:25px;

    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,.12);

}

/* Header */

.booking-header{

    background:linear-gradient(135deg,#0d6efd,#4facfe);

    color:white;

    padding:35px;

    position:relative;

}

.booking-header::after{

    content:"";

    position:absolute;

    width:180px;

    height:180px;

    background:rgba(255,255,255,.15);

    border-radius:50%;

    top:-60px;

    right:-60px;

}

.booking-header h2{

    font-weight:700;

}

/* Body */

.booking-body{

    background:white;

    padding:35px;

}

/* Input */

.form-control,

.form-select{

    border-radius:12px;

    padding:12px;

    margin-bottom:20px;

}

.form-control:focus,

.form-select:focus{

    border-color:#0d6efd;

    box-shadow:0 0 0 .2rem rgba(13,110,253,.15);

}

/* Info Box */

.info-box{

    background:#eef6ff;

    border-left:5px solid #0d6efd;

    padding:15px;

    border-radius:12px;

    margin-bottom:25px;

}

/* Button */

.btn-book{

    border-radius:30px;

    padding:14px;

    font-weight:600;

}

/* Icon */

.input-group-text{

    background:#0d6efd;

    color:white;

    border:none;

}

</style>

</head>

<body>

<div class="container">

<div class="card booking-card">

<div class="booking-header">

<div class="row align-items-center">

<div class="col-md-8">

<h2>

🚗 Booking Kendaraan

</h2>

<p>

Silakan lengkapi data pemesanan kendaraan RentRide.

</p>

</div>

<div class="col-md-4 text-end">

<i class="bi bi-car-front-fill"
style="font-size:80px;opacity:.25;"></i>

</div>

</div>

</div>

<div class="booking-body">

<div class="info-box">

<i class="bi bi-info-circle-fill text-primary"></i>

Pastikan tanggal dan lokasi penjemputan sudah benar sebelum melakukan booking.

</div>

<form>

<label class="fw-semibold">

Nama Kendaraan

</label>

<div class="input-group mb-3">

<span class="input-group-text">

<i class="bi bi-car-front-fill"></i>

</span>

<select class="form-select">

<option>Honda Brio</option>

<option>Toyota Avanza</option>

<option>Honda Beat</option>

</select>

</div>

<label class="fw-semibold">

Tanggal Mulai

</label>

<div class="input-group mb-3">

<span class="input-group-text">

<i class="bi bi-calendar-event"></i>

</span>

<input type="date"
class="form-control">

</div>

<label class="fw-semibold">

Tanggal Selesai

</label>

<div class="input-group mb-3">

<span class="input-group-text">

<i class="bi bi-calendar-check"></i>

</span>

<input type="date"
class="form-control">

</div>

<label class="fw-semibold">

Lokasi Penjemputan

</label>

<div class="input-group mb-3">

<span class="input-group-text">

<i class="bi bi-geo-alt-fill"></i>

</span>

<input class="form-control"
placeholder="Masukkan lokasi">

</div>

<label class="fw-semibold">

Metode Pembayaran

</label>

<div class="input-group mb-4">

<span class="input-group-text">

<i class="bi bi-credit-card-fill"></i>

</span>

<select class="form-select">

<option>Transfer Bank</option>

<option>QRIS</option>

<option>E-Wallet</option>

</select>

</div>

<button class="btn btn-primary btn-book w-100">

<i class="bi bi-check-circle-fill"></i>

Konfirmasi Booking

</button>

</form>

</div>

</div>

</div>

</body>

</html>

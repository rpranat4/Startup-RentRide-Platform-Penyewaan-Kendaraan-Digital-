<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - RentRide</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fb;
        }

        .register-box{
            max-width:550px;
            margin:auto;
            margin-top:60px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,0,0,.1);
        }

        .logo{
            font-size:60px;
        }

        .btn-register{
            background:#0d6efd;
            color:white;
        }

        .btn-register:hover{
            background:#0b5ed7;
            color:white;
        }
    </style>

</head>

<body>

<div class="register-box">

<div class="text-center">

<div class="logo">
🚗
</div>

<h2 class="fw-bold text-primary">
RentRide
</h2>

<p>
Buat akun baru untuk mulai menyewa kendaraan
</p>

</div>

<form>

<div class="mb-3">
<label>Nama Lengkap</label>
<input type="text" class="form-control" placeholder="Masukkan Nama">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" placeholder="Masukkan Email">
</div>

<div class="mb-3">
<label>No. HP</label>
<input type="text" class="form-control" placeholder="08xxxxxxxxxx">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control">
</div>

<div class="mb-4">
<label>Konfirmasi Password</label>
<input type="password" class="form-control">
</div>

<button class="btn btn-register w-100">

Daftar Sekarang

</button>

</form>

<hr>

<div class="text-center">

Sudah punya akun?

<a href="login.html">

Login

</a>

</div>

</div>

</body>

</html>
